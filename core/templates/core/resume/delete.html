{% extends 'core/base_dashboard.html' %}
{% block title %}Delete Resume — CareerSync{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="cs-card">
      <div class="cs-card-body text-center py-5">
        <i class="bi bi-trash3-fill text-danger fs-1 d-block mb-3"></i>
        <h5 class="fw-800">Delete Resume?</h5>
        <p class="text-muted">Are you sure you want to delete <strong>{{ resume.title }}</strong>? This action cannot be undone.</p>
        <div class="d-flex gap-3 justify-content-center mt-4">
          <a href="{% url 'resume_list' %}" class="btn btn-outline-secondary px-4" style="border-radius:8px;">Cancel</a>
          <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger px-4 fw-600" style="border-radius:8px;">
              <i class="bi bi-trash3 me-2"></i>Yes, Delete
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
